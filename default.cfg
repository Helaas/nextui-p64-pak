# N64 button bindings for TG5040
# Standard-map mode: hold R2 to use face buttons as C-buttons
# Right analog stick also controls C-buttons (analog)
#
# Physical → RetroJoypad → N64 action
# B       → JOYPAD_B    → A Button (or C-Down when R2 held)
# Y       → JOYPAD_Y    → B Button (or C-Left when R2 held)
# A       → JOYPAD_A    → C-Right  (when R2 held)
# X       → JOYPAD_X    → C-Up     (when R2 held)
# L1      → JOYPAD_L    → L Trigger
# R1      → JOYPAD_R    → R Trigger
# L2      → JOYPAD_L2   → Z Trigger
# R2      → JOYPAD_R2   → C Buttons modifier

bind D-Pad U = UP
bind D-Pad D = DOWN
bind D-Pad L = LEFT
bind D-Pad R = RIGHT
bind Start = START
bind A Button = B
bind B Button = Y
bind Z Trigger = L2
bind L Trigger = L1
bind R Trigger = R1
bind C Buttons Mode = R2
bind C-Up = X
bind C-Right = A

# Core performance options
parallel-n64-gfxplugin = glide64
parallel-n64-rspplugin = hle
parallel-n64-gfxplugin-accuracy = low
parallel-n64-cpucore = dynamic_recompiler
